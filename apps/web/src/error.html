<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#181818" />
    <title>%sveltekit.status% — %sveltekit.error.message%</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #181818;
        color: #ffffff;
      }

      body {
        min-height: 100vh;
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(36rem, calc(100% - 3rem));
        padding-block: 4rem;
      }

      .status {
        margin: 0 0 1rem;
        color: #bbbbbb;
        font-size: 0.875rem;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 3.5rem);
        line-height: 1.08;
      }

      p {
        margin: 1.5rem 0 0;
        color: #d0d0d0;
        font-size: 1.125rem;
        line-height: 1.7;
      }

      a {
        display: inline-block;
        margin-top: 2rem;
        border-radius: 0.75rem;
        padding: 1rem 1.5rem;
        background: #ffffff;
        color: #181818;
        font-weight: 700;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 2px solid #ffffff;
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="status">%sveltekit.status%</p>
      <h1>Something went wrong.</h1>
      <p>%sveltekit.error.message%</p>
      <a href="/">Return home</a>
    </main>
  </body>
</html>
