<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#181818" />
    <title>%sveltekit.status% · %sveltekit.error.message%</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #181818;
        color: #f5f5f5;
      }

      body {
        display: grid;
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        place-items: center;
      }

      main {
        width: min(36rem, calc(100% - 3rem));
      }

      p {
        color: #b7b7b7;
        line-height: 1.7;
      }

      .status {
        margin: 0;
        color: #929292;
        font-size: 0.875rem;
        font-weight: 600;
      }

      h1 {
        margin: 0.75rem 0 0;
        font-size: clamp(2.25rem, 8vw, 3.5rem);
        line-height: 1.05;
      }

      a {
        display: inline-block;
        padding: 0.9rem 1.25rem;
        margin-top: 1rem;
        color: #181818;
        font-weight: 700;
        text-decoration: none;
        background: #fff;
        border-radius: 0.75rem;
      }

      a:focus-visible {
        outline: 2px solid #fff;
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="status">Error %sveltekit.status%</p>
      <h1>Unable to load the page</h1>
      <p>%sveltekit.error.message%</p>
      <a href="/">Back to home</a>
    </main>
  </body>
</html>
